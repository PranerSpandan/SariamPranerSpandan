backend:
  name: github
  repo: PranerSpandan/SariamPranerSpandan   # ← your GitHub repo
  branch: main                               # ← your branch

# Where uploaded photos/videos are stored (inside /public/gallery/)
media_folder: "public/gallery"
public_folder: "/gallery"

# The site URL – used for the OAuth redirect during login
site_url: https://pranerspandan.github.io/SariamPranerSpandan

collections:
  - name: "gallery"
    label: "Gallery"
    label_singular: "Photo / Video"
    description: >
      Add, edit, or remove photos and videos from the NGO website gallery.
      Just upload a file, fill in the details and click Publish.
    folder: ""                # items are stored as a JSON file, not individual files
    format: json
    extension: json
    create: false             # we manage a single gallery.json file
    files:
      - label: "Gallery Items"
        name: "gallery"
        file: "public/gallery.json"
        description: "All gallery photos and videos"
        fields:
          - label: "Gallery Items"
            name: ""
            widget: list
            label_singular: "Item"
            fields:
              - { label: "ID", name: id, widget: number, hint: "Unique number for this item" }
              - label: "Type"
                name: type
                widget: select
                options:
                  - { label: "Photo", value: image }
                  - { label: "Video", value: video }
                default: image
              - { label: "Title", name: title, widget: string }
              - { label: "Caption", name: caption, widget: text, required: false }
              - label: "Photo / Video File"
                name: src
                widget: image
                media_folder: "/public/gallery"
                public_folder: "/gallery"
              - label: "Category"
                name: category
                widget: select
                options:
                  - Plantation
                  - Awareness
                  - Schools
                  - Team
                  - Event
                  - Other
